<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RCMailAI 历史记录页，查看已生成邮件。" />
    <title>RCMailAI - 历史记录</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a class="text-xl font-bold text-gray-900 tracking-tight" href="index.html">RC<span class="text-blue-700">MailAI</span></a>
                <div class="text-sm font-medium space-x-6 flex items-center">
                    <a class="text-gray-500 hover:text-blue-700" href="index.html">首页</a>
                    <a class="text-gray-500 hover:text-blue-700" href="generate.html">新建邮件</a>
                    <a class="text-blue-700" href="history.html">历史记录</a>
                    <a class="text-gray-500 hover:text-blue-700" href="auth.html">登录</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <div class="flex items-center justify-between gap-4 flex-wrap mb-6">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900">历史记录</h1>
            <button id="clear-history-btn" class="px-4 py-2 rounded-lg border border-red-500 text-red-600 text-sm font-semibold hover:bg-red-50" type="button">清空记录</button>
        </div>

        <section class="bg-white border border-gray-200 rounded-2xl p-5 mb-6">
            <div class="grid grid-cols-1 md:grid-cols-[1fr_auto] gap-3 items-end">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="history-email">当前账号</label>
                    <input id="history-email" type="email" class="w-full rounded-lg border border-gray-300 px-4 py-3 bg-gray-50" readonly />
                </div>
                <button id="load-history-btn" class="px-5 py-3 rounded-lg bg-blue-700 text-white text-sm font-semibold hover:bg-blue-800" type="button">加载记录</button>
            </div>
            <p id="history-status" class="hidden mt-3 text-sm"></p>
        </section>

        <section id="history-empty" class="bg-white border border-gray-200 rounded-2xl p-8 text-gray-500">
            还没有历史记录，请先去新建邮件页生成内容。
        </section>

        <section id="history-list" class="hidden space-y-4"></section>
    </main>

    <script src="history.js"></script>
</body>
</html>
