<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RCMailAI 邮件生成页，选择模板并快速生成中俄商务邮件。" />
    <title>RCMailAI - 新建邮件</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css" />
</head>
<body class="min-h-screen">
    <nav class="bg-white border-b sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="h-16 flex items-center justify-between">
                <a class="text-xl font-bold text-gray-900 tracking-tight" href="index.html">RC<span class="text-blue-700">MailAI</span></a>
                <div class="text-sm font-medium space-x-6 flex items-center">
                    <a class="text-gray-500 hover:text-blue-700" href="index.html">首页</a>
                    <a class="text-blue-700" href="generate.html">新建邮件</a>
                    <a class="text-gray-500 hover:text-blue-700" href="history.html">历史记录</a>
                    <a class="text-gray-500 hover:text-blue-700" href="auth.html">登录</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        <section class="bg-white border border-gray-200 rounded-2xl p-6 sm:p-8 shadow-sm">
            <h1 class="text-2xl sm:text-3xl font-bold text-gray-900 mb-2">生成商务邮件</h1>
            <p class="text-gray-500 mb-8">已接入 LLM。登录后输入中文要点，自动生成得体俄语商务邮件。</p>

            <div class="mb-6 rounded-lg border border-blue-100 bg-blue-50 px-4 py-3 text-sm text-blue-900">
                当前账号：<span id="current-email" class="font-semibold"></span>
            </div>

            <form id="mail-form" class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="templateType">模板类型</label>
                    <select id="templateType" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="exhibition">展会邀请</option>
                        <option value="cooperation">合作洽谈</option>
                        <option value="followup">客户跟进</option>
                        <option value="aftersale">售后服务</option>
                        <option value="payment">催款提醒</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="recipient">收件人公司/姓名</label>
                    <input id="recipient" type="text" placeholder="例如：ООО ТехПром" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" required />
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="purpose">沟通目的</label>
                    <textarea id="purpose" rows="5" placeholder="例如：邀请客户参加 5 月莫斯科展会，附展位号和预约时间。" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400" required></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="keyPoints">补充要点（可选）</label>
                    <textarea id="keyPoints" rows="4" placeholder="例如：报价有效期 10 天、附件含产品目录、希望 3 月底前确认。" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2" for="tone">语气风格</label>
                    <select id="tone" class="w-full rounded-lg border border-gray-300 px-4 py-3 focus:outline-none focus:ring-2 focus:ring-blue-400">
                        <option value="professional">专业正式</option>
                        <option value="friendly">友好合作</option>
                        <option value="firm">礼貌但坚定</option>
                    </select>
                </div>

                <button type="submit" class="bg-blue-700 text-white px-6 py-3 rounded-lg font-semibold hover:bg-blue-800 transition">生成邮件</button>
            </form>

            <p id="form-status" class="hidden mt-4 text-sm"></p>
        </section>

        <section id="result-panel" class="hidden mt-8 bg-white border border-gray-200 rounded-2xl p-6 sm:p-8 shadow-sm">
            <div class="flex items-center justify-between gap-4 flex-wrap mb-4">
                <h2 class="text-xl font-bold text-gray-900">生成结果</h2>
                <div class="flex gap-2">
                    <button id="copy-ru-btn" class="px-4 py-2 rounded-lg border border-gray-300 text-gray-700 hover:bg-gray-50 text-sm font-semibold" type="button">复制俄语邮件</button>
                    <button id="save-history-btn" class="px-4 py-2 rounded-lg border border-blue-600 text-blue-700 hover:bg-blue-50 text-sm font-semibold" type="button">保存到历史记录</button>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <h3 class="font-semibold text-gray-700 mb-2">中文邮件</h3>
                    <pre id="mail-cn" class="whitespace-pre-wrap text-sm leading-7 text-gray-700 bg-gray-50 rounded-lg p-4 border border-gray-100"></pre>
                </div>
                <div>
                    <h3 class="font-semibold text-gray-700 mb-2">俄语邮件</h3>
                    <pre id="mail-ru" class="whitespace-pre-wrap text-sm leading-7 text-gray-700 bg-gray-50 rounded-lg p-4 border border-gray-100"></pre>
                </div>
            </div>
        </section>
    </main>

    <script src="main.js"></script>
    <script src="generate.js"></script>
</body>
</html>
